ode:
  epsilon: 0.1
  initial_step_size: 0.01
  min_step_size: 1.0e-6
  max_step_size: 0.1

solver:
  method: minres
  tol: 1.0e-8
  max_iter: 500

tracker:
  max_steps: 4000
  closure_tol: 1.0e-3

controller:
  input_dim: 8
  hidden_dims: [128, 128, 64]
  dropout: 0.05
  norm_type: layernorm
  activation: silu
  head_hidden_dim: 64
  step_size_min: 1.0e-4
  step_size_max: 0.1

training:
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  epochs: 100
  lambda_step: 1.0
  gradient_clip_norm: 1.0
  noise_std: 0.01
  scheduler_factor: 0.5
  scheduler_patience: 8
  early_stop_patience: 15
