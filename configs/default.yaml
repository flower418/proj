ode:
  epsilon: 0.1
  initial_step_size: 0.01
  min_step_size: 1.0e-6
  max_step_size: 0.1

solver:
  method: minres
  tol: 1.0e-8
  max_iter: 500

tracker:
  max_steps: 1000
  closure_tol: 1.0e-3
  restart_drift_threshold: 1.0e-4

controller:
  hidden_dims: [64, 64]
  dropout: 0.1
  norm_type: layernorm
  step_size_min: 1.0e-4
  step_size_max: 0.1

training:
  batch_size: 128
  learning_rate: 1.0e-3
  epochs: 100
  lambda_step: 1.0
  lambda_restart: 5.0
  alpha_restart: 0.9
  focal_gamma: 2.0
  noise_std: 0.01
  scheduler_factor: 0.5
  scheduler_patience: 5
